<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Resiliencia - Hackathon ESPOL</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; display: flex; height: 100vh; background-color: #f4f4f9;}
        /* Ampliamos ligeramente el panel a 350px para acomodar el texto más grande */
        #sidebar { width: 350px; background-color: #2c3e50; color: white; padding: 25px; box-sizing: border-box; overflow-y: auto; display: flex; flex-direction: column;}
        
        /* Tamaños de letra incrementados */
        #sidebar h2 { font-size: 1.8rem; margin-top: 0; border-bottom: 1px solid #34495e; padding-bottom: 15px;}
        .form-group { margin-bottom: 25px; }
        
        #sidebar label { display: block; margin-bottom: 8px; font-size: 1.2rem; color: #ecf0f1; }
        #sidebar input { width: 100%; padding: 15px; border: none; border-radius: 4px; box-sizing: border-box; background-color: #34495e; color: white; font-size: 1.4rem;}
        #sidebar button { width: 100%; padding: 15px; background-color: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 15px; transition: 0.3s; font-size: 1.4rem;}
        #sidebar button:hover { background-color: #2ecc71; }
        
        .info-api { font-size: 1.1rem; color: #bdc3c7; margin-top: 25px; text-align: center; font-style: italic; line-height: 1.4;}
        
        #mapa-container { flex-grow: 1; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>Simulador de Riesgo</h2>
        <form method="POST" action="">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Predicción de Lluvia (mm/día)</label>
                <input type="number" name="lluvia" value="{{ lluvia_actual }}" min="0" max="300" step="0.1">
            </div>

            <button type="submit">Calcular Impacto</button>
        </form>
        <div class="info-api">
            Al cargar, obtenemos la predicción real para mañana mediante Open-Meteo API.
        </div>
    </div>
    
    <div id="mapa-container">
        {{ mapa|safe }}
    </div>
</body>
</html>
